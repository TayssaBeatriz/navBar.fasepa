const container = document.querySelector("#contatos");

  const itensMenu = document.querySelectorAll(".clickSubItens");

    iM.addEventListener("click", function (e) {
      e.stopPropagation();

      const subMenu = this.nextElementSibling;

      document.querySelectorAll(".SubMenu").forEach(sM => {
        if (sM !== subMenu) {
          sM.style.display = "none";
        }
      });

     const isOpen = subMenu.classList.contains("ativo");

document.querySelectorAll(".SubMenu").forEach(sM => {
  sM.classList.remove("ativo");
});

if (!isOpen) {
  subMenu.classList.add("ativo");
    });

if (container) {
  const itensLista = container.querySelectorAll(".elementor-icon-list-text");
  telefoneEl = itensLista[0];
  emailEl = itensLista[1];
  localizacaoEl = itensLista[2];
  
}


document.addEventListener("click", function(e){

  const item = e.target.closest(".item, .clickSubItens");
  if (!item) return;
  
 
 
 


  const diretoria = item.dataset.diretoria;
  const cargoKey = item.dataset.cargo;

  if (!diretoria || !cargoKey) {
    console.log("Faltando data attributes");
    return;
  }

  const pessoa = dados[diretoria]?.[cargoKey];

  console.log("CLICK:", diretoria, cargoKey, pessoa);

  if (!pessoa){
    nome.textContent = "Informação não encontrada";
    if (container) container.style.display = "none";
    return;
  }

  nome.textContent = pessoa.nome || "";
  cargoEl.textContent = pessoa.cargo || "";
  if (setor) setor.textContent = pessoa.setor || "";

  if (container) {
    container.style.display = "block";
    if (telefoneEl) telefoneEl.textContent = pessoa.telefone || "-";
    if (emailEl) emailEl.textContent = pessoa.email || "-";
    if (localizacaoEl) localizacaoEl.textContent = pessoa.localizacao || "-";
    
  }
  
   if (cargoKey === "presidente") {
    if (foto) foto.style.display = "block";
    if (descricao) descricao.style.display = "block";
    nome.style.color = "#0071C8";
  } else {
    if (foto) foto.style.display = "none";
    if (descricao) descricao.style.display = "none";
    nome.style.color = "#54595F";
  }

});
